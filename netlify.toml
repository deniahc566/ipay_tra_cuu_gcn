[build]
  command   = "npm run build"
  publish   = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION              = "20"
  NEXT_TELEMETRY_DISABLED   = "1"
  # These are not secrets — omit from Netlify secrets scanning
  # ALLOWED_EMAIL_DOMAIN is a plain domain string; NEXT_PUBLIC_* is intentionally public
  SECRETS_SCAN_OMIT_KEYS    = "ALLOWED_EMAIL_DOMAIN,CANCEL_ALLOWED_EMAILS,NEXT_PUBLIC_CANCEL_ALLOWED_EMAILS"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
