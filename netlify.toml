[build]
  command   = "npm run build"
  publish   = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # nft bundler correctly traces and includes native .node binaries (DuckDB).
  node_bundler          = "nft"
  external_node_modules = ["@duckdb/node-api", "@duckdb/node-bindings"]

[build.environment]
  NODE_VERSION              = "20"
  NEXT_TELEMETRY_DISABLED   = "1"
  # These are not secrets — omit from Netlify secrets scanning
  # ALLOWED_EMAIL_DOMAIN is a plain domain string; NEXT_PUBLIC_* is intentionally public
  SECRETS_SCAN_OMIT_KEYS    = "ALLOWED_EMAIL_DOMAIN,CANCEL_ALLOWED_EMAILS,NEXT_PUBLIC_CANCEL_ALLOWED_EMAILS,ADMIN_EMAILS"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    # NOTE: 'unsafe-eval' is required by Next.js 14's webpack runtime and styled-jsx.
    # It cannot be removed without upstream changes to the framework.
    # 'unsafe-inline' is required for Next.js inline scripts and styles.
    # These are known limitations; frame-ancestors 'none' and other directives still
    # restrict the highest-impact XSS vectors.
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
